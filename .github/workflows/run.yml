name: Auto API update check

permissions:
  actions: write
  checks: write
  contents: write

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 📦 Checkout
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================
      # 🧠 Setup Bun
      # ======================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ======================
      # 📦 Install deps (CI-safe)
      # ======================
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ======================
      # 🧪 Ensure Puppeteer exists (FIX YOUR ERROR)
      # ======================
      - name: Verify Puppeteer
        run: |
          bun pm ls puppeteer || bun add puppeteer

      # ======================
      # 🧪 Debug environment (optional but useful)
      # ======================
      - name: Check environment
        run: |
          node -v
          bun -v
          bun pm ls

      # ======================
      # ⚙️ Git config
      # ======================
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ======================
      # 🚀 Run scraper (Puppeteer safe mode)
      # ======================
      - name: Run archive script
        uses: nick-fields/retry@v3
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: bun run src/main.ts archive

      # ======================
      # 🧼 Format output
      # ======================
      - name: Format output folder
        run: bun x oxfmt output

      # ======================
      # 💾 Commit stage 1
      # ======================
      - name: Git commit and push (stage 1)
        id: commit_1
        continue-on-error: true
        uses: iarekylew00t/verified-bot-commit@v2
        with:
          message: "[Auto] API update"
          files: |
            output/akEndfield/**
            output/raw/**
            output/mirror_file_list_pending.json
            output/mirror_file_res_list_pending.json
            output/mirror_file_res_patch_list_pending.json
          if-no-commit: info

      # ======================
      # 🪂 fallback commit
      # ======================
      - name: Git commit and push (Fallback stage 1)
        if: steps.commit_1.outcome == 'failure'
        run: |
          git add output/akEndfield/** output/raw/** output/mirror_file_list_pending.json output/mirror_file_res_list_pending.json output/mirror_file_res_patch_list_pending.json
          git commit -m "[Auto] API update" || echo "No changes"
          git push
        continue-on-error: true

      # ======================
      # 🧼 Format again (post-process safe)
      # ======================
      - name: Format output folder (post)
        run: bun x oxfmt output

      # ======================
      # 🔄 Pull latest before commit
      # ======================
      - name: Git pull
        run: git pull --rebase

      # ======================
      # 💾 Commit stage 2
      # ======================
      - name: Git commit and push (stage 2)
        id: commit_2
        continue-on-error: true
        uses: iarekylew00t/verified-bot-commit@v2
        with:
          message: "[Auto] API update"
          files: |
            output/mirror_file_list.json
            output/mirror_file_list_pending.json
            output/mirror_file_res_list.json.zst
            output/mirror_file_res_list_pending.json
            output/mirror_file_res_patch_list.json.zst
            output/mirror_file_res_patch_list_pending.json
          if-no-commit: info

      # ======================
      # 🪂 fallback commit 2
      # ======================
      - name: Git commit and push (Fallback stage 2)
        if: steps.commit_2.outcome == 'failure'
        run: |
          git add output/mirror_file_list.json output/mirror_file_list_pending.json output/mirror_file_res_list.json.zst output/mirror_file_res_list_pending.json output/mirror_file_res_patch_list.json.zst output/mirror_file_res_patch_list_pending.json
          git commit -m "[Auto] API update" || echo "No changes"
          git push
        continue-on-error: true
