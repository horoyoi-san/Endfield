name: Auto API Diff Check

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 📦 Checkout (ต้องมี fetch-depth 0)
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # 🧠 Setup Bun
      # ======================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ======================
      # 📦 Install deps
      # ======================
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ======================
      # 🧪 Debug (สำคัญมาก)
      # ======================
      - name: Debug output folder
        run: |
          echo "=== OUTPUT BEFORE ==="
          ls -R output || echo "no output folder"

      # ======================
      # 🚀 Run scraper
      # ======================
      - name: Run scraper
        run: bun run operator.ts archive --dry

      # ======================
      # 🧪 Debug หลัง run
      # ======================
      - name: Check output after run
        run: |
          echo "=== OUTPUT AFTER ==="
          ls -R output || echo "no output folder"

      # ======================
      # 📦 Stage files
      # ======================
      - name: Stage output
        run: git add output || true

      # ======================
      # 🔍 Detect changes
      # ======================
      - name: Detect changes
        id: diff
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ======================
      # 💾 COMMIT + PUSH (FIX สำคัญที่สุด)
      # ======================
      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "[Auto] update output"
          git push

      # ======================
      # 🧠 fallback log (ถ้าไม่มี change)
      # ======================
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes detected"
