name: Auto API Diff Check

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 21 * * *'  # รันก่อนตัวหลัก 1 ชม.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 📦 Checkout
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # 🧠 Setup Bun
      # ======================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ======================
      # 📦 Install deps
      # ======================
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ======================
      # 🚀 Run ONLY scraper (lightweight mode)
      # ======================
      - name: Run minimal scrape check
        run: bun run src/operator.ts archive --dry

      # ======================
      # 🔍 Check diff against last commit
      # ======================
      - name: Detect changes
        id: diff
        run: |
          git add output

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ======================
      # ⛔ STOP if no change
      # ======================
      - name: Skip
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes → skip trigger"

      # ======================
      # 🚀 TRIGGER MAIN WORKFLOW
      # ======================
      - name: Trigger main pipeline
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "auto-api-update.yml",
              ref: "main"
            });

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "bot@users.noreply.github.com"
            git add output
            git commit -m "[Auto] update"
            git push
