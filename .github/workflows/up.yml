name: Auto API update check

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 📦 Checkout
      # ======================
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      # ======================
      # 🧠 Setup Bun
      # ======================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ======================
      # 📦 Install deps
      # ======================
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ======================
      # 📁 Ensure output folder
      # ======================
      - name: Prepare output
        run: mkdir -p output

      # ======================
      # 🚀 Run scraper (operator)
      # ======================
      - name: Run operator scraper
        run: bun run operator.ts archive

      # ======================
      # 🧪 Debug
      # ======================
      - name: Check output
        run: ls -R output

      # ======================
      # 💾 Commit and Push
      # ======================
      - name: Commit and Push
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git add output

          if ! git diff --cached --quiet; then
            git commit -m "Update characters [auto]"
            git push https://x-access-token:${PAT}@github.com/${{ github.repository }} HEAD:main
          else
            echo "No changes to commit"
          fi
